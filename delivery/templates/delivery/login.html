{% extends 'delivery/base.html' %}
{% block content %}
<div class="cart-container" style="max-width: 500px; margin: 0 auto;">
    <h2>Увійти в акаунт</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-order" style="width: 100%; margin-top: 15px; background-color: #3498db;">Увійти</button>
    </form>
    <div style="margin-top: 20px; text-align: center;">
        <a href="{% url 'password_reset' %}" style="color: #e74c3c; text-decoration: none; font-weight: bold;">Забули пароль? (Відновити)</a>
    </div>
</div>
{% endblock %}
