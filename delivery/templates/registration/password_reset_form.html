{% extends 'delivery/base.html' %}
{% block content %}
<div class="cart-container" style="max-width: 500px; margin: 0 auto;">
    <h2>Відновлення пароля</h2>
    <p style="color: #7f8c8d;">Введіть ваш email, і ми надішлемо вам посилання для безпечної зміни пароля.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-order" style="width: 100%; margin-top: 15px;">Надіслати лист</button>
    </form>
</div>
{% endblock %}
